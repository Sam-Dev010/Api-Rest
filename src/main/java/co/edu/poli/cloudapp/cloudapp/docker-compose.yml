version: '3.8'
services:
  mysql_db:
    image: mysql:8.0 
    container_name: spring_mysql_db
    restart: always
    environment:
    
      MYSQL_ROOT_PASSWORD: 1234 
      MYSQL_DATABASE: estudiante 
      MYSQL_USER: poli_user
      MYSQL_PASSWORD: 1234 
    ports:
      - "3309:3306" 
    volumes:
      - db_data:/var/lib/mysql


volumes:
  db_data:
